name: trace-jepa

program_path: examples/trace-jepa/program.md

objective:
  metric: probe_auroc
  direction: max

target:
  type: basilica
  workdir: examples/trace-jepa
  timeout_s: 5400
  prepare_cmd:
    - python3
    - /app/prepare.py
    - --n-sessions
    - "100000"
  train_cmd:
    - python3
    - /app/train.py
  basilica:
    # ADR-016: custom runtime image with torch + lightning + transformers
    # + stable-pretraining + timm + git + autojepa core deps baked in.
    # Same image as Phase-2 (ijepa-cifar10) — trace-jepa's extra runtime
    # deps (webdataset for shard streaming, the TraceTransformer code
    # paths) are pure-Python and resolve via the autojepa[jepa] extra
    # at setup_cmd time without a full torch reinstall.
    image: ghcr.io/epappas/autojepa-runtime:phase2
    gpu_count: 1
    gpu_models: ["A100", "H100", "L40S", "RTX-4090", "RTX-A6000"]
    memory: "32Gi"
    cpu: "8"
    storage: "/data"
    ttl_seconds: 6000
    # 600s ready timeout with deps baked in (matches Phase-2 config.yaml
    # ready_timeout_s rationale: warm container <60s, 10x headroom for
    # image-pull + cold network). Was 3600s when this example shipped
    # against a vanilla pytorch base image; reduced 2026-05-19 once the
    # baked image was verified working end-to-end in Phase-2 v30.
    ready_timeout_s: 600
    # NOTE: Use deploy.py rather than `autojepa run config.yaml` directly.
    # deploy.py reads train.py + prepare.py locally, base64-encodes them,
    # and injects them into /app/. Pip-installing autojepa from GitHub
    # provides autojepa.* imports but NOT examples/.
    setup_cmd: |
      pip install --no-cache-dir 'autojepa[jepa] @ git+https://github.com/epappas/autojepa.git@HEAD' && \
      python -c "from autojepa import cli; print('autojepa importable — but train.py/prepare.py NOT injected; use deploy.py')"

policy:
  type: hybrid
  mutable_file: examples/trace-jepa/train.py
  frozen_file: examples/trace-jepa/prepare.py
  program_file: examples/trace-jepa/program.md
  params:
    learning_rate: [0.00005, 0.0001, 0.0003, 0.0005]
    weight_decay: [0.0, 0.05, 0.1]
    batch_size: [32, 64, 128]
    # Capped at 4000 per the Phase-2 v21/v23/v24/v25/v26/v28 evidence:
    # any iter that asked for max_steps=6000 was silently killed by
    # basilica around step 4300 (~46 min into pod life, well under TTL).
    # docs/phase-2-fix-diary.md 2026-05-18 entry has the heartbeat trail.
    # The TraceTransformer here is a different model from Phase-2's
    # ViT-Tiny, but the failure mode is basilica-side, not training-side.
    max_steps: [2000, 3000, 4000]
    encoder_depth: [4, 6, 8]
    encoder_dim: [256, 384, 512]
    encoder_heads: [4, 6, 8]
    predictor_depth: [1, 2, 3, 4]
    predictor_embed_dim: [64, 128, 192]
    num_targets: [2, 4, 6]
    ema_decay_start: [0.99, 0.996, 0.999]
    # Phase-3 search axes per docs/research/mts-jepa.md and TODO.md
    # Phase-3 (codebook_size=0 is the vanilla JEPA control row).
    codebook_size: [0, 64, 256, 1024]
    codebook_loss_weight: [0.0, 0.1, 0.5, 1.0]
    future_block_weight: [0.5, 1.0, 2.0]
    multi_block_weight: [0.0, 0.5, 1.0]
    probe_eval_every_n_steps: [500]
  # Migrated 2026-05-19 from Chutes/DeepSeek-V3 to Claude Sonnet 4.6 via
  # OpenRouter — same migration Phase-2 (ijepa-cifar10) made on
  # 2026-05-17. Rationale: Phase-2 v23 surfaced that Chutes was silently
  # 404'ing on DeepSeek (ADR-017) AND that a stronger reasoning model
  # produced substantively better diffs (v30 iter=4 Claude diff was the
  # first kept LLM-authored ratchet). Phase-3 starts on the validated
  # stack instead of repeating the migration.
  llm_api_url: "https://openrouter.ai/api/v1"
  # ADR-017 fallback list: sonnet 4.6 is the cost/quality sweet spot,
  # opus 4.7 is the fallback if Sonnet fails.
  llm_model:
    - "anthropic/claude-sonnet-4-6"
    - "anthropic/claude-opus-4-7"
  llm_api_key_env: "OPENROUTER_API_KEY"
  # 300s per Phase-2 evidence (60s was too short for Claude with the
  # full production prompt; ADR commentary in
  # examples/ijepa-cifar10/config.yaml + diary 2026-05-17 entry).
  llm_timeout_s: 300
  # explore=3 / stall=2 matches Phase-2's working config (v30 reached
  # diff mode at iter 4 — first stall after the 3-iter baseline window).
  # The old explore=25 / stall=5 would have meant diff mode never
  # triggered in a 30-iter campaign (25+5 == 30 == max_iterations,
  # blocked by the test_policy_is_hybrid invariant). Same bug pattern
  # as v21 / fixed in commit a30c7be.
  hybrid_param_explore_iters: 3
  hybrid_stall_threshold: 2
  hybrid_diff_failure_limit: 5

controller:
  # Phase-3 campaign budget per writeup §11 — 30 iters > Phase-2's 20
  # because the codebook_size + codebook_loss_weight axes inflate the
  # per-iter search space.
  max_iterations: 30
  max_wall_time_s: 172800
  no_improve_limit: 10
  failure_rate_limit: 0.7
  failure_window: 6
  checkpoint_path: artifacts/trace-jepa/checkpoint.json
  intra_iteration_cancel:
    enabled: true
    min_steps: 2000
    poll_interval_s: 30.0
    min_reports_before_decide: 10

comparability:
  budget_mode: parallel_wallclock
  expected_budget_s: 172800
  expected_hardware_fingerprint: null
  strict: false

telemetry:
  trace_path: traces/trace-jepa/events.jsonl
  ledger_path: artifacts/trace-jepa/results.tsv
  artifacts_dir: artifacts/trace-jepa/runs
  versions_dir: artifacts/trace-jepa/versions
  model_output_dir: artifacts/trace-jepa/models
