name: ijepa-cifar10

program_path: examples/ijepa-cifar10/program.md

objective:
  metric: probe_auroc
  direction: max

target:
  type: basilica
  workdir: examples/ijepa-cifar10
  # Bumped 2026-05-17 from 3600s -> 5400s. v21 iter=1 and v23 iter=1
  # both cancelled because max_steps=6000 training (~1800s) + slow
  # model-upload tail (~1700s) exceeded the old 3600s wall, losing
  # iters that achieved probe>best. 5400s gives ~1900s upload
  # headroom which covers the worst observed tail.
  timeout_s: 5400
  prepare_cmd:
    - python3
    - /app/prepare.py
  train_cmd:
    - python3
    - /app/train.py
  basilica:
    # ADR-016: custom runtime image with torch + lightning +
    # transformers + stable-pretraining + timm + git + autojepa core
    # deps baked in. Built + pushed by examples/ijepa-cifar10/build_image.sh.
    image: ghcr.io/epappas/autojepa-runtime:phase2
    gpu_count: 1
    gpu_models: ["A100", "H100", "L40S", "RTX-4090", "RTX-A6000"]
    memory: "32Gi"
    cpu: "8"
    storage: "/data"
    ttl_seconds: 4200
    # 600s ready timeout. With deps baked into the image, setup_cmd is
    # just `pip install --no-deps autojepa @ git+...` + base64
    # train.py/prepare.py inject + sanity import. Empirically <60s on a
    # warm container; 600s gives 10x headroom for image-pull + cold
    # network. Replaces the 3600s budget that covered the old cold-pip
    # install.
    ready_timeout_s: 600
    # NOTE: Use deploy.py rather than `autojepa run config.yaml` directly.
    # deploy.py reads train.py + prepare.py locally, base64-encodes them,
    # and injects them into /app/ via this setup_cmd. Pip-installing
    # autojepa from GitHub provides autojepa.* imports but NOT examples/.
    # If you bypass deploy.py, the train_cmd will fail with "No such file".
    setup_cmd: |
      pip install --no-cache-dir 'autojepa[jepa] @ git+https://github.com/epappas/autojepa.git@HEAD' && \
      python -c "from autojepa import cli; print('autojepa importable — but train.py/prepare.py NOT injected; use deploy.py')"

policy:
  type: hybrid
  mutable_file: examples/ijepa-cifar10/train.py
  frozen_file: examples/ijepa-cifar10/prepare.py
  program_file: examples/ijepa-cifar10/program.md
  params:
    learning_rate: [0.00005, 0.0001, 0.0002, 0.0005]
    weight_decay: [0.0, 0.05, 0.1]
    batch_size: [64, 128, 256]
    max_steps: [2000, 4000, 6000]
    predictor_depth: [2, 3, 4, 6]
    predictor_embed_dim: [128, 192]
    num_targets: [2, 3, 4]
    ema_decay_start: [0.99, 0.996, 0.999]
    probe_eval_every_n_steps: [500]
  # Migrated 2026-05-17 from Kimi (kimi-k2.6) to Claude Sonnet 4.6 via
  # OpenRouter. v23 evidence: Kimi proposed an identical no-op diff
  # (`use_qk_norm = True` line append after `sys.exit(...)`) for
  # iter=3 AND iter=4 despite recent_errors/recent_logs feedback in
  # the prompt. That falsifies Kimi at the current prompt; switching
  # to a stronger reasoning model AND strengthening the diff prompt
  # (anti-no-op rule + concrete VICReg example) is the joint fix per
  # the falsifier-redesign decision (writeup §12 falsifier branch B).
  llm_api_url: "https://openrouter.ai/api/v1"
  # ADR-017 fallback list still applies. Opus is more capable but
  # ~5x cost; Sonnet 4.6 is the cost/quality sweet spot for the diff
  # generation prompt. opus-4-7 is the fallback if Sonnet fails.
  llm_model:
    - "anthropic/claude-sonnet-4-6"
    - "anthropic/claude-opus-4-7"
  llm_api_key_env: "OPENROUTER_API_KEY"
  # Bumped 2026-05-17 from 60s -> 300s. v24 evidence: with the production
  # diff prompt (full train.py + JEPA_HARD_RULES + history, ~10-20K input
  # tokens), Claude takes >60s to generate the response. urllib cut the
  # stream mid-output, leaving a 200-char truncated diff that ended
  # mid-line ("lr=LEARNING_RATE,  "). Reproducible with the policy code;
  # a minimal-prompt direct test of the same model returns a clean
  # 618-char diff in <10s. 300s gives ample headroom; OpenRouter
  # request-side timeout is typically much larger. See
  # docs/phase-2-fix-diary.md 2026-05-17 entry.
  llm_timeout_s: 300
  hybrid_param_explore_iters: 3
  hybrid_stall_threshold: 2
  hybrid_diff_failure_limit: 5

controller:
  max_iterations: 20
  max_wall_time_s: 86400
  no_improve_limit: 8
  failure_rate_limit: 0.7
  failure_window: 6
  checkpoint_path: artifacts/ijepa-cifar10/checkpoint.json
  intra_iteration_cancel:
    enabled: true
    min_steps: 2000
    poll_interval_s: 30.0
    min_reports_before_decide: 10

comparability:
  budget_mode: parallel_wallclock
  expected_budget_s: 86400
  expected_hardware_fingerprint: null
  strict: false

telemetry:
  trace_path: traces/ijepa-cifar10/events.jsonl
  ledger_path: artifacts/ijepa-cifar10/results.tsv
  artifacts_dir: artifacts/ijepa-cifar10/runs
  versions_dir: artifacts/ijepa-cifar10/versions
  model_output_dir: artifacts/ijepa-cifar10/models
